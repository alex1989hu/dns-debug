name: image-publish

on:
  push:
    branches:
      - "**"
  pull_request:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64

    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
      - name: Login to Registry
        if: github.event_name != 'pull_request' && github.actor != 'dependabot[bot]'
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push arch image
        if: github.event_name != 'pull_request' && github.actor != 'dependabot[bot]'
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          provenance: false
          push: true
          labels: ${{ steps.docker_meta.outputs.labels }}
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}-${{ matrix.arch }}
          annotations: ${{ steps.docker_meta.outputs.annotations }}
      - name: Build arch image for PR validation
        if: github.event_name == 'pull_request' || github.actor == 'dependabot[bot]'
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          provenance: false
          push: false
          labels: ${{ steps.docker_meta.outputs.labels }}
          annotations: ${{ steps.docker_meta.outputs.annotations }}

  publish-manifest:
    needs: build
    if: github.event_name != 'pull_request' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
      - name: Login to Registry
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push manifest list
        run: |
          annotation_args=()
          while IFS= read -r annotation; do
            [ -n "$annotation" ] && annotation_args+=(--annotation "$annotation")
          done <<< "${ANNOTATIONS}"

          for tag in ${TAGS}; do
            docker buildx imagetools create \
              "${annotation_args[@]}" \
              --tag "${tag}" \
              "ghcr.io/${{ github.repository }}:${{ github.sha }}-amd64" \
              "ghcr.io/${{ github.repository }}:${{ github.sha }}-arm64"
          done
        env:
          ANNOTATIONS: ${{ steps.docker_meta.outputs.annotations }}
          TAGS: ${{ steps.docker_meta.outputs.tags }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.0.0
      - name: Sign the container images
        run: |
          first_tag="$(printf '%s\n' "${TAGS}" | head -n1)"
          digest="$(docker buildx imagetools inspect "${first_tag}" --format '{{json .Manifest.Digest}}' | tr -d '"')"

          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${digest} "
          done

          cosign sign --yes ${images}
        env:
          TAGS: ${{ steps.docker_meta.outputs.tags }}
          COSIGN_EXPERIMENTAL: 1
